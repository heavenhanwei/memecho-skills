name: Validate

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m unittest discover -s tests -v
      - run: python skills/memecho-analyze-conversation/scripts/validate_contract.py request examples/request-meeting.json
      - run: python skills/memecho-analyze-conversation/scripts/validate_contract.py result examples/result-text-only.json
